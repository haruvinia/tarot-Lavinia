<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para Você ❤️</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="circle">

    <div class="photo" style="--i:0; --r:380px; --rot:-8deg;">
      <div class="postit"><img src="PrimeiroDate.jpg"><p>O primero encontro</p></div>
    </div>

    <div class="photo" style="--i:1; --r:400px; --rot:5deg;">
      <div class="postit"><img src="VillaLobos.jpg"><p>Eu e você</p></div>
    </div>

    <div class="photo" style="--i:2; --r:390px; --rot:-3deg;">
      <div class="postit"><img src="AsMeias.jpg"><p>As marcas registradas</p></div>
    </div>

    <div class="photo" style="--i:3; --r:410px; --rot:7deg;">
      <div class="postit"><img src="FotoFofa.jpg"><p>Eu te amo</p></div>
    </div>

    <div class="photo" style="--i:4; --r:380px; --rot:-6deg;">
      <div class="postit"><img src="MelhorFoto.jpg"><p>Nossa memória mais bonita</p></div>
    </div>

    <div class="photo" style="--i:5; --r:400px; --rot:4deg;">
      <div class="postit"><img src="MeuAmor.jpg"><p>bla bla bla</p></div>
    </div>

    <div class="photo" style="--i:6; --r:400px; --rot:-5deg;">
      <div class="postit"><img src="MinhaCasa.jpg"><p>No ônibus né</p></div>
    </div>

    <div class="photo" style="--i:7; --r:400px; --rot:6deg;">
      <div class="postit"><img src="SuaCasa.jpg"><p>Abre o olho, rapaz</p></div>
    </div>

    <div class="photo" style="--i:8; --r:390px; --rot:-4deg;">
      <div class="postit"><img src="Agnt.jpg"><p>Pra sempre</p></div>
    </div>

    <div class="photo" style="--i:9; --r:410px; --rot:8deg;">
      <div class="postit"><img src="Ultimodate.jpg"><p>Até agora</p></div>
    </div>

  </div>

  <div class="center-text" id="centerText">
    Você é o catarro da minha meleca, amor. Te amo demais, minha vida. Obrigada por tudo, por ser quem você é, por me fazer tão feliz.
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
