<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para Você ❤️</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="circle">

    <!-- agora cada item tem variações -->
    <div class="photo" style="--i:0; --r:380px; --rot:-8deg;">
      <div class="postit"><img src="img1.jpg"><p>Nosso começo 💕</p></div>
    </div>

    <div class="photo" style="--i:1; --r:400px; --rot:5deg;">
      <div class="postit"><img src="img2.jpg"><p>Primeiro encontro</p></div>
    </div>

    <div class="photo" style="--i:2; --r:390px; --rot:-3deg;">
      <div class="postit"><img src="img3.jpg"><p>Sorrisos</p></div>
    </div>

    <div class="photo" style="--i:3; --r:410px; --rot:7deg;">
      <div class="postit"><img src="img4.jpg"><p>Momentos únicos</p></div>
    </div>

    <div class="photo" style="--i:4; --r:380px; --rot:-6deg;">
      <div class="postit"><img src="img5.jpg"><p>Viagem juntos</p></div>
    </div>

    <div class="photo" style="--i:5; --r:400px; --rot:4deg;">
      <div class="postit"><img src="img6.jpg"><p>Abraços</p></div>
    </div>

    <div class="photo" style="--i:6; --r:400px; --rot:-5deg;">
      <div class="postit"><img src="img7.jpg"><p>Risadas</p></div>
    </div>

    <div class="photo" style="--i:7; --r:400px; --rot:6deg;">
      <div class="postit"><img src="img8.jpg"><p>Amor</p></div>
    </div>

    <div class="photo" style="--i:8; --r:390px; --rot:-4deg;">
      <div class="postit"><img src="img9.jpg"><p>Para sempre</p></div>
    </div>

    <div class="photo" style="--i:9; --r:410px; --rot:8deg;">
      <div class="postit"><img src="img10.jpg"><p>Eu & Você</p></div>
    </div>

  </div>

  <div class="center-text" id="centerText">
    Você é a melhor parte da minha vida ❤️
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
